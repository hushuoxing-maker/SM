<body>

<div class="container">

<h1>实木商业门头设计AI智能体</h1>

<div class="card">

<input id="brand" placeholder="输入：品牌店名 + 主营品类 + 醒目标语（例如：山野茶舍 · 新中式茶饮 · 山野好茶）">

<button onclick="generate()">生成20组门头提示词</button>

</div>

<div id="results" class="results"></div>

</div>

<script>

function rand(arr){函数 rand(arr){函数 rand(arr){函数rand(arr){
return arr[Math.floor(Math.random()*arr.length)]返回 arr[Math.floor(Math.random()*arr.length)]
}

let layouts=[
"横向整幅实木门头结构",
"实木格栅分层门头结构",
"极简木质横梁门头结构",
"日系木格栅门头结构",
"中式木框门头结构",
"实木线性结构门头",
"深色实木板整幅门头",
"原木色极简门头结构"
]

let woods=[让 树林=[
"原木色防腐木板材",
"深胡桃色实木板材",
"碳化防腐木板材",
"浅色原木板材",
"深色实木格栅板",
"自然纹理防腐木板"
]

let slogans=[
"自然生活方式",
"匠心品质",
"慢享生活",
"东方生活美学",
"自然之味",
"品质优选",
"手作好味道",
"匠心好物",
"山野自然",
"生活之选",
"每日新鲜",
"温暖生活"
]

function generate(){

let brand=document.getElementById("brand").value.trim()

if(!brand){
alert("请输入品牌店名 + 主营品类 + 标语")
return
}

let container=document.getElementById("results")
container.innerHTML=""

for(let i=1;i<=20;i++){

let text=`

白天自然光环境，门头正立面完整展示，正面平视视角，无透视畸变，无任何遮挡

${brand}

实木商业门头设计

门头结构：
${rand(layouts)}

木材材质：
${rand(woods)}，真实木纹理质感

文字设计：
品牌店名 + 主营品类 + 标语：${rand(slogans)}
书法字体或简约字体设计

材质组合：
实木板材
实木格栅结构
木质字
不锈钢字
亚克力字
钛金字
金属包边

灯光设计：
日间暖光洗墙灯
背发光字
局部暖光照明

风格氛围：
自然温润质感
中式与日系融合风格
商业门头真实施工结构

环境：
真实商业街门头场景

画质：
8K高清
商业写实效果图
细节丰富
色彩自然
真实施工参考
`

let card=document.createElement("div")
card.className="promptCard"

card.innerHTML=`

<div class="promptTitle">提示词 #${i}</div>
<div class="promptText">${text}</div>
<button class="copyBtn">复制提示词</button>

`

let btn=card.querySelector("button")

btn.onclick=function(){

navigator.clipboard.writeText(text)

btn.innerText="已复制"

btn.classList.add("copied")

setTimeout(()=>{
btn.innerText="复制提示词"
btn.classList.remove("copied")
},3000)

}

container.appendChild(card)

}

}

</script>
